<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simply Assistant</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,800,900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <div class="brand">SIMPLY</div>
      <button id="auth-nav-btn" class="signup-btn" style="display: none;">LOGOUT</button>
    </header>

    <div id="auth-gate" class="auth-gate" style="display: none;">
      <div class="auth-gate-content">
        <div class="auth-gate-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#fb8569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <h2 class="auth-gate-title">LOG IN INTO YOUR ACCOUNT TO CONTINUE</h2>

        <form id="extension-login-form" class="extension-login-form">
          <input type="email" id="ext-email" placeholder="EMAIL ID" required />
          <input type="password" id="ext-password" placeholder="PASSWORD" required />
          <button type="submit" id="ext-login-btn" class="ext-login-btn">SIGN IN</button>
          <div id="ext-error" class="ext-error"></div>
        </form>

        <div class="auth-gate-divider"></div>
        <p class="auth-gate-subtext">Don't have an account?</p>
        <a href="http://localhost:5173/#/account" target="_blank" class="auth-gate-link">CREATE ONE ON SIMPLY →</a>
      </div>
    </div>

    <main id="main-content" class="content">
      <div id="chat-section" class="chat-section empty-state">
        <div id="chat-messages" class="chat-messages"></div>

        <div class="input-wrapper">
          <div class="plus-dropdown-container">
            <button id="plus-btn" class="plus-btn" title="Add feature">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fb8569" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </button>
            <div id="features-dropdown" class="features-dropdown">
              <div class="dropdown-item" id="menu-summary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="21" y1="10" x2="3" y2="10"></line>
                  <line x1="21" y1="6" x2="3" y2="6"></line>
                  <line x1="21" y1="14" x2="3" y2="14"></line>
                  <line x1="21" y1="18" x2="3" y2="18"></line>
                </svg>
                <span>SUMMARY</span>
              </div>
            </div>
          </div>

          <input type="text" id="query-input" placeholder="Ask Anything" autocomplete="off" />
          
          <button id="send-btn" class="send-btn" title="Send Question">
            <svg class="send-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0d1f1c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="popup.js"></script>
</body>
</html>
